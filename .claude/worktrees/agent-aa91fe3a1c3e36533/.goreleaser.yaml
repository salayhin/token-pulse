version: 2

project_name: tokenpulse

before:
  hooks:
    - go mod tidy

builds:
  - id: tokenpulse
    main: ./cmd/tokenpulse
    binary: tokenpulse
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{ .Version }} -X main.commit={{ .ShortCommit }}
    goos: [darwin, linux, windows]
    goarch: [amd64, arm64]
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: default
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else }}{{ .Arch }}{{ end }}
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - README.md
      - LICENSE*

checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: "{{ .Tag }}-next"

release:
  prerelease: auto
  draft: false

brews:
  - name: tokenpulse
    repository:
      owner: sirajus-salayhin
      name: homebrew-tap
      branch: main
    homepage: https://github.com/sirajus-salayhin/tokenpulse
    description: Local dashboard & CLI for Claude Code usage analytics
    license: MIT
    install: |
      bin.install "tokenpulse"
    test: |
      system "#{bin}/tokenpulse", "--help"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - Merge pull request
      - Merge branch
