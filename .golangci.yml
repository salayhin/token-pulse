version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell

  settings:
    errcheck:
      exclude-functions:
        - (io.Closer).Close
        - (*database/sql.Tx).Rollback
        - (*database/sql.Stmt).Close
        - (*database/sql.Rows).Close
        - (*os.File).Close
        - (*github.com/fsnotify/fsnotify.Watcher).Close
        - (*text/tabwriter.Writer).Flush
        - fmt.Fprintln
        - fmt.Fprintf
        - fmt.Fprint

  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck

formatters:
  enable:
    - gofmt
    - goimports
