<svg viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Main logo group -->
  <g transform="translate(120, 120)">
    <!-- Background circle (subtle) -->
    <circle cx="0" cy="0" r="105" fill="#f0f4ff" opacity="0.4"/>
    <circle cx="0" cy="0" r="105" fill="none" stroke="#e5e7eb" stroke-width="1.5" opacity="0.5"/>
    
    <!-- Dashboard bars (top section) -->
    <g opacity="0.9">
      <rect x="-70" y="-70" width="50" height="14" rx="7" fill="#60a5fa"/>
      <rect x="20" y="-70" width="50" height="14" rx="7" fill="#3b82f6"/>
      
      <rect x="-70" y="-48" width="35" height="12" rx="6" fill="#3b82f6"/>
      <rect x="-30" y="-48" width="40" height="12" rx="6" fill="#60a5fa"/>
      <rect x="15" y="-48" width="30" height="12" rx="6" fill="#1e40af" opacity="0.8"/>
      
      <rect x="-70" y="-28" width="55" height="12" rx="6" fill="#1e40af" opacity="0.7"/>
      <rect x="-10" y="-28" width="55" height="12" rx="6" fill="#3b82f6"/>
    </g>
    
    <!-- Pulse wave (main element) -->
    <path d="M -85 8 Q -75 8 -65 8 L -55 -8 L -40 18 L -25 8 L 5 8 L 18 -12 L 30 20 L 45 8 L 75 8 L 85 8" 
          stroke="url(#blueGrad)" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Growth indicator (upward arrow) -->
    <g fill="none" stroke="url(#blueGrad)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
      <path d="M -5 35 L -5 65 M -5 65 L -18 48 M -5 65 L 8 48"/>
    </g>
    
    <!-- Token indicator (circuit dots) -->
    <circle cx="55" cy="-70" r="5" fill="#60a5fa" opacity="0.8"/>
    <circle cx="-75" cy="65" r="4" fill="#3b82f6" opacity="0.7"/>
    <circle cx="70" cy="50" r="4" fill="#60a5fa" opacity="0.6"/>
  </g>
</svg>
