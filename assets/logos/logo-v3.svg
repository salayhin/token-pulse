<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <g transform="translate(100, 100)">
    <!-- Minimalist design -->
    
    <!-- Three stacked horizontal bars (representing dashboard) -->
    <rect x="-50" y="-50" width="40" height="12" rx="6" fill="#3b82f6" opacity="0.9"/>
    <rect x="10" y="-50" width="40" height="12" rx="6" fill="#60a5fa" opacity="0.7"/>
    
    <rect x="-50" y="-25" width="30" height="12" rx="6" fill="#60a5fa" opacity="0.8"/>
    <rect x="-15" y="-25" width="35" height="12" rx="6" fill="#3b82f6" opacity="0.9"/>
    <rect x="25" y="-25" width="25" height="12" rx="6" fill="#1e40af" opacity="0.6"/>
    
    <!-- Pulse wave -->
    <path d="M -60 5 L -40 5 L -30 -5 L -20 15 L -10 5 L 10 5 L 20 -8 L 30 18 L 40 5 L 60 5" 
          stroke="#3b82f6" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Upward arrow (growth) -->
    <g fill="none" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="0,30 0,50 -15,35" />
      <polyline points="0,30 0,50 15,35" />
    </g>
  </g>
</svg>
