<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <g transform="translate(100, 100)">
    <!-- Outer circle ring -->
    <circle cx="0" cy="0" r="85" fill="none" stroke="#e5e7eb" stroke-width="2"/>
    
    <!-- Pulse wave - stylized heartbeat -->
    <path d="M -70 0 L -55 0 L -45 -15 L -35 15 L -25 0 L 0 0 L 10 -20 L 20 20 L 30 0 L 60 0 L 70 0" 
          stroke="url(#grad)" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Lightning bolt accent -->
    <g fill="url(#grad)">
      <polygon points="5,-18 12,-5 8,-3 15,12 2,8 6,0" opacity="0.8"/>
    </g>
    
    <!-- Token circles -->
    <circle cx="-50" cy="-40" r="5" fill="#60a5fa" opacity="0.7"/>
    <circle cx="45" cy="-35" r="6" fill="#3b82f6" opacity="0.6"/>
    <circle cx="50" cy="45" r="4" fill="#60a5fa" opacity="0.5"/>
    <circle cx="-55" cy="50" r="5" fill="#3b82f6" opacity="0.7"/>
  </g>
</svg>
