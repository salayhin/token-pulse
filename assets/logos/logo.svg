<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle (optional, remove if not needed) -->
  <!-- <circle cx="100" cy="100" r="95" fill="#f0f4ff" stroke="#3b82f6" stroke-width="2"/> -->
  
  <!-- Main logo group -->
  <g transform="translate(100, 100)">
    <!-- Pulse wave lines -->
    <g stroke="#3b82f6" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <!-- Left wave -->
      <path d="M -70 0 Q -60 -8 -50 0 Q -40 8 -30 0" opacity="0.6"/>
      
      <!-- Center wave (main) -->
      <path d="M -25 0 Q -15 -12 -5 0 Q 5 12 15 0 Q 25 -12 35 0" opacity="1"/>
      
      <!-- Right wave -->
      <path d="M 40 0 Q 50 -8 60 0 Q 70 8 80 0" opacity="0.6"/>
    </g>
    
    <!-- Lightning bolt in center -->
    <g fill="#3b82f6">
      <!-- Lightning bolt shape -->
      <polygon points="0,-25 8,-8 0,-5 10,15 -8,5 0,8" />
    </g>
    
    <!-- Top circle accent -->
    <circle cx="0" cy="-35" r="4" fill="#60a5fa" opacity="0.8"/>
    
    <!-- Bottom circles accent -->
    <circle cx="-12" cy="28" r="3" fill="#60a5fa" opacity="0.6"/>
    <circle cx="12" cy="28" r="3" fill="#60a5fa" opacity="0.6"/>
  </g>
</svg>
